description:
  en:
    localisedName: jeap-opensearch-client-starter
    shortDescription: Spring Boot starter for type-safe, authorization-aware OpenSearch read access in jEAP applications
    longDescription: >
      jeap-opensearch-client-starter auto-configures an OpenSearchClient and a SearchItemClient that lets jEAP
      application services query OpenSearch indices defined by IndexType descriptors.
      It supports both plain HTTP transport (Apache HttpClient 5) and AWS-signed transport (AwsSdk2Transport with
      DefaultCredentialsProvider), selected automatically based on whether an AWS signing region is configured.
      Access is restricted by jEAP roles declared on each IndexType, and results are deserialized into the
      strongly-typed data class of the matching IndexType.
      The SearchItemClient executes multi-version searches across ISM rollover indices, and UserSearchItemAuthorization
      integrates with jEAP security for user-based role checks.
    features:
      - Auto-configured OpenSearchClient for Apache HTTP and AWS-signed transports
      - SearchItemClient for multi-version searches across ISM rollover indices
      - Authorization filter via SearchItemAuthorization and UserSearchItemAuthorization
      - SearchItemView non-generic result type eliminates wildcard return types from public APIs
